name: "🚀 Website"

on:
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: "Skip deployment?"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      skipDeploy:
        description: "Skip deployment?"
        type: boolean
        default: false

concurrency: "website"

env:
  NX: node_modules/.bin/nx

jobs:
  # @note: Website has no dependencies, but maybe later it will.
  #  build:
  #    uses: ./.github/workflows/build.yml
  #    with:
  #      testOnly: true

  artifacts:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔧 Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: "📦 Install dependencies"
        uses: ./.github/actions/install

      - name: "💽 Restore .next/cache cache"
        uses: ./.github/actions/next-cache

      - name: "🔧 Setup Pages"
        uses: actions/configure-pages@v5

      - name: "🔨 Build"
        run: ${{ env.NX }} run website:build:production

      - name: "📦 Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/apps/website

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [ artifacts ]
    if: ${{ github.event.inputs.skipDeploy == 'false' }}
    steps:
      - name: "🚀 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
