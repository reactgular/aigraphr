name: "🚀 Publish"

on:
  workflow_dispatch:
    inputs:
      firstRelease:
        description: "Is this the first release?"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      firstRelease:
        description: "Is this the first release?"
        type: boolean
        default: false

concurrency: "publish"

env:
  NX: node_modules/.bin/nx

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔧 Setup node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          registry-url: 'https://npm.pkg.github.com/'

      - name: "📜 SHAs for Nx affected"
        uses: nrwl/nx-set-shas@v4

      - name: "📦 Install dependencies"
        uses: ./.github/actions/install

      - name: "🔨 Build"
        run: ${{ env.NX }} run-many -t build

      - name: "🚀 Publish packages"
        run: |
          ${{ env.NX }} release ${{ github.event.inputs.firstRelease == 'true' && '--first-release' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
