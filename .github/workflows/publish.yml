name: "🚀 Publish"

on:
  workflow_dispatch:
    inputs:
      firstRelease:
        description: "Is this the first release?"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      firstRelease:
        description: "Is this the first release?"
        type: boolean
        default: false

concurrency: "publish"

env:
  NX: node_modules/.bin/nx

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: ${{ github.event.inputs.firstRelease == 'false' }}
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔧 Setup node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          registry-url: 'https://npm.pkg.github.com/'

      - name: "📜 SHAs for Nx affected"
        uses: nrwl/nx-set-shas@v4

      - name: "📦 Install dependencies"
        uses: ./.github/actions/install

      - name: "🔍 Environment Info"
        run: npx nx report

      - name: "🔧 Configure git"
        run: |
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Generate branch name
        id: generate_branch
        run: |
          BRANCH_NAME="releases/published-$(date +'%Y%m%d%H%M%S')"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          echo "::notice title={Release Branch}::Release Branch: ${BRANCH_NAME}"

      - name: Create new branch
        run: |
          git checkout -b ${{ env.BRANCH_NAME }}

      - name: "🔨 Build"
        run: ${{ env.NX }} run-many -t build

      - name: "🚀 Release packages"
        run: |
          ${{ env.NX }} release --yes ${{ github.event.inputs.firstRelease == 'true' && '--first-release' || '' }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          head: ${{ env.BRANCH_NAME }}
          title: 'Automated PR'
          body: 'This PR was created by a GitHub Action.'

      - name: "🆕 Create Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          # Write the body in conventional commit format
          title: "chore(release): 🚀 ${{ github.event.inputs.firstRelease == 'true' && 'First release' || 'Release' }}"
          body: ""
          base: main
          head: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ""
          labels: "release"
          draft: true
